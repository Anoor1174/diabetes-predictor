<!DOCTYPE html>
<html lang="en">
<!DOCTYPE html>
<head>
    <title>Lifestyle Assessment</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/lifestyle.js" defer></script>
</head>

<body>
    <div class="navbar">
    <a href="/">Home</a>
    <a href="/lifestyle">Lifestyle Assessment</a>
    <a href="/clinical">Clinical Assessment</a>
</div>
    <div class="container">
        <h1>Lifestyle Risk Assessment</h1>

        <div class="form-section">
            <label>Physical Activity (minutes per week)</label>
            <input type="number" id="activity_minutes" min="0" max="2000">

            <label>Sedentary Hours per Day</label>
            <input type="number" id="sedentary_hours" min="0" max="24">

            <label>Smoking Status</label>
            <select id="smoking_status">
                <option value="never">Never Smoked</option>
                <option value="former">Former Smoker</option>
                <option value="current">Current Smoker</option>
            </select>

            <label>Fruit & Veg Servings per Day</label>
            <input type="number" id="fruit_veg" min="0" max="20">

            <label>Sugary Drinks per Day</label>
            <input type="number" id="sugary_drinks" min="0" max="20">

            <label>Fast Food Meals per Week</label>
            <input type="number" id="fast_food" min="0" max="20">

            <label>Alcohol Drinks per Week</label>
            <input type="number" id="alcohol" min="0" max="50">

            <label>Sleep Hours per Night</label>
            <input type="number" id="sleep_hours" min="0" max="24">
        </div>

        <button onclick="submitLifestyle()">Submit</button>

        <div id="result"></div>
    </div>
</body>
</html>
